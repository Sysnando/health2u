name: Health2u
options:
  bundleIdPrefix: com.health2u
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

targets:
  Health2u:
    type: application
    platform: iOS
    sources:
      - Sources/Health2u
    info:
      path: Sources/Health2u/Info.plist
      properties:
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~iPhone:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        NSCameraUsageDescription: "2YH needs camera access to photograph your medical documents for upload."
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.health2u.ios
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.10"
  Health2uTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/Health2uTests
    dependencies:
      - target: Health2u
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.health2u.ios.tests
        SWIFT_VERSION: "5.10"
        GENERATE_INFOPLIST_FILE: YES
